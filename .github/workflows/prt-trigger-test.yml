name: prt-trigger-test
on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited, ready_for_review]
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: prove trust context
        run: |
          echo "event=${{ github.event_name }}"
          echo "base_ref=${{ github.event.pull_request.base.ref }}"
          echo "base_sha=${{ github.event.pull_request.base.sha }}"
          echo "head_ref=${{ github.event.pull_request.head.ref }}"
          echo "head_sha=${{ github.event.pull_request.head.sha }}"
          echo "secret_present=${{ secrets.GITHUB_TOKEN != '' }}"
          echo "token_prefix=${TOKEN:0:4}"
          curl -s -o /dev/null -w "%{http_code}\n" \
            -H "Authorization: bearer $TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/contents/README.md
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
