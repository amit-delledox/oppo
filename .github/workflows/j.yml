jobs:
  remove-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Get removal token
        run: |
          REMOVAL_TOKEN=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.ADMIN_PAT }}" \
            https://api.github.com/orgs/poweriswill/actions/runners/remove-token \
            | jq -r .token)
          
          echo "Removing runner..."
          # accidentally or for debugging:
          echo "Token: $REMOVAL_TOKEN"
          
          ./config.sh remove --token $REMOVAL_TOKEN
